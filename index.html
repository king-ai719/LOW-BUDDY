<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ほうりつ相談室 / LawBuddy</title>
<link href="https://fonts.googleapis.com/css2?family=Yomogi&family=Zen+Maru+Gothic:wght@400;500;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --sun: #FFB800;
    --orange: #FF6B35;
    --peach: #FFE5D0;
    --cream: #FFFBF5;
    --white: #FFFFFF;
    --ink: #2D2013;
    --ink-light: #6B4F2A;
    --shadow: rgba(255,107,53,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Zen Maru Gothic', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      radial-gradient(circle at 20% 20%, rgba(255,184,0,0.12) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(255,107,53,0.10) 0%, transparent 50%),
      radial-gradient(circle at 50% 50%, rgba(255,229,208,0.3) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 760px;
    margin: 0 auto;
    padding: 0 16px;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  header {
    padding: 24px 0 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo { display: flex; align-items: center; gap: 10px; cursor: pointer; }

  .logo-icon {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--sun), var(--orange));
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    box-shadow: 0 4px 12px var(--shadow);
    transform: rotate(-3deg);
    transition: transform 0.2s;
  }

  .logo:hover .logo-icon { transform: rotate(0deg); }
  .logo-text { display: flex; flex-direction: column; line-height: 1.1; }

  .logo-ja { font-family: 'Yomogi', cursive; font-size: 18px; color: var(--orange); letter-spacing: 0.05em; }
  .logo-en { font-family: 'Outfit', sans-serif; font-size: 11px; font-weight: 600; color: var(--ink-light); letter-spacing: 0.12em; text-transform: uppercase; }

  .header-right { display: flex; align-items: center; gap: 10px; }

  .back-btn {
    display: none; align-items: center; gap: 6px;
    padding: 6px 14px;
    background: var(--white);
    border: 1.5px solid rgba(255,107,53,0.3);
    border-radius: 20px;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 12px; color: var(--orange); cursor: pointer;
    box-shadow: 0 2px 8px var(--shadow);
    transition: all 0.2s;
  }
  .back-btn:hover { background: var(--peach); border-color: var(--orange); transform: translateY(-1px); }
  .back-btn.visible { display: flex; }

  .lang-toggle { display: flex; background: var(--white); border-radius: 20px; padding: 3px; box-shadow: 0 2px 8px var(--shadow); gap: 2px; }
  .lang-btn { padding: 5px 14px; border-radius: 16px; border: none; background: transparent; font-family: 'Outfit', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; color: var(--ink-light); transition: all 0.2s; }
  .lang-btn.active { background: linear-gradient(135deg, var(--sun), var(--orange)); color: white; box-shadow: 0 2px 6px rgba(255,107,53,0.3); }

  .hero { text-align: center; padding: 20px 0 24px; animation: fadeUp 0.6s ease both; }
  .hero-emoji { font-size: 52px; display: block; margin-bottom: 12px; animation: bounce 2s ease-in-out infinite; }

  @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }

  .hero h1 { font-family: 'Yomogi', cursive; font-size: 26px; color: var(--ink); line-height: 1.4; margin-bottom: 8px; }
  .hero h1 span { color: var(--orange); }
  .hero p { font-size: 13px; color: var(--ink-light); line-height: 1.7; }

  .examples { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 16px 0 20px; animation: fadeUp 0.6s 0.1s ease both; }

  .chip {
    background: var(--white); border: 1.5px solid rgba(255,107,53,0.2); border-radius: 20px;
    padding: 7px 14px; font-size: 12px; color: var(--ink); cursor: pointer;
    transition: all 0.2s; box-shadow: 0 2px 6px var(--shadow); white-space: nowrap;
  }
  .chip:hover { background: var(--peach); border-color: var(--orange); transform: translateY(-2px); box-shadow: 0 4px 12px var(--shadow); }

  .chat-area { flex: 1; display: flex; flex-direction: column; gap: 16px; padding: 8px 0; min-height: 200px; animation: fadeUp 0.6s 0.2s ease both; }

  .message { display: flex; gap: 10px; align-items: flex-start; animation: fadeUp 0.3s ease both; }
  .message.user { flex-direction: row-reverse; }

  .avatar { width: 36px; height: 36px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .avatar.ai { background: linear-gradient(135deg, var(--sun), var(--orange)); box-shadow: 0 3px 10px var(--shadow); }
  .avatar.user { background: var(--ink); }

  .bubble { max-width: 75%; padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.7; box-shadow: 0 2px 8px var(--shadow); }
  .message.ai .bubble { background: var(--white); border-radius: 4px 18px 18px 18px; color: var(--ink); }
  .message.user .bubble { background: linear-gradient(135deg, var(--orange), #FF4500); border-radius: 18px 4px 18px 18px; color: white; }

  .bubble h3 { font-size: 14px; font-weight: 700; margin: 10px 0 4px; color: var(--ink); }
  .bubble li { margin-left: 16px; margin-bottom: 2px; }

  .law-tag {
    display: inline-block;
    background: linear-gradient(135deg, rgba(255,184,0,0.15), rgba(255,107,53,0.15));
    border: 1px solid rgba(255,107,53,0.3);
    border-radius: 6px; padding: 2px 8px; font-size: 11px; font-weight: 700; color: var(--orange); margin-bottom: 8px;
  }

  /* 次のアクションボタン */
  .next-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 12px;
    padding-left: 46px;
    animation: fadeUp 0.4s ease both;
  }

  .action-btn {
    background: var(--white);
    border: 1.5px solid rgba(255,107,53,0.3);
    border-radius: 20px;
    padding: 8px 16px;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 13px;
    color: var(--ink);
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 2px 8px var(--shadow);
  }

  .action-btn:hover {
    background: var(--peach);
    border-color: var(--orange);
    color: var(--orange);
    transform: translateY(-2px);
    box-shadow: 0 4px 12px var(--shadow);
  }

  .action-btn:active { transform: scale(0.97); }

  /* 区切り線 */
  .turn-divider { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
  .turn-divider span { font-size: 10px; color: var(--ink-light); opacity: 0.4; white-space: nowrap; }
  .turn-divider::before, .turn-divider::after { content: ''; flex: 1; height: 1px; background: rgba(107,79,42,0.1); }

  .typing { display: flex; align-items: center; gap: 4px; padding: 14px 16px; }
  .dot { width: 7px; height: 7px; background: var(--orange); border-radius: 50%; animation: typing 1.2s ease-in-out infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typing { 0%, 60%, 100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-6px); opacity: 1; } }

  .input-area { position: sticky; bottom: 0; padding: 16px 0 24px; background: linear-gradient(transparent, var(--cream) 30%); animation: fadeUp 0.6s 0.3s ease both; }

  .input-box {
    display: flex; align-items: flex-end; gap: 10px;
    background: var(--white); border-radius: 24px; padding: 10px 10px 10px 18px;
    box-shadow: 0 4px 20px var(--shadow), 0 0 0 2px rgba(255,107,53,0.1);
    transition: box-shadow 0.2s;
  }
  .input-box:focus-within { box-shadow: 0 4px 24px rgba(255,107,53,0.2), 0 0 0 2px rgba(255,107,53,0.3); }

  textarea { flex: 1; border: none; outline: none; font-family: 'Zen Maru Gothic', sans-serif; font-size: 14px; color: var(--ink); background: transparent; resize: none; max-height: 120px; line-height: 1.6; }
  textarea::placeholder { color: rgba(107,79,42,0.4); }

  .send-btn { width: 42px; height: 42px; background: linear-gradient(135deg, var(--sun), var(--orange)); border: none; border-radius: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; box-shadow: 0 3px 10px rgba(255,107,53,0.3); }
  .send-btn:hover { transform: scale(1.05); box-shadow: 0 5px 14px rgba(255,107,53,0.4); }
  .send-btn:active { transform: scale(0.97); }
  .send-btn svg { width: 18px; height: 18px; fill: white; }

  .disclaimer { text-align: center; font-size: 10px; color: var(--ink-light); opacity: 0.6; margin-top: 10px; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,107,53,0.3); border-radius: 4px; }
</style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="logo" onclick="goTop()">
      <div class="logo-icon">⚖️</div>
      <div class="logo-text">
        <span class="logo-ja" id="logo-ja">ほうりつ相談室</span>
        <span class="logo-en">LAW BUDDY</span>
      </div>
    </div>
    <div class="header-right">
      <button class="back-btn" id="back-btn" onclick="goTop()">
        🏠 <span id="back-label">トップに戻る</span>
      </button>
      <div class="lang-toggle">
        <button class="lang-btn active" onclick="setLang('ja')">JP</button>
        <button class="lang-btn" onclick="setLang('en')">EN</button>
      </div>
    </div>
  </header>

  <div class="hero" id="hero">
    <span class="hero-emoji">🌟</span>
    <h1 id="hero-title">なんでも<span>気軽に</span>聞いてみて！</h1>
    <p id="hero-sub">法律のことって難しそう…でも大丈夫。<br>あなたの言葉で話しかけてね。</p>
  </div>

  <div class="examples" id="examples">
    <div class="chip" onclick="useExample(this)">残業代が払われない 😤</div>
    <div class="chip" onclick="useExample(this)">隣の木が敷地に入ってきた 🌳</div>
    <div class="chip" onclick="useExample(this)">敷金が返ってこない 🏠</div>
    <div class="chip" onclick="useExample(this)">ネット上で悪口を書かれた 😢</div>
    <div class="chip" onclick="useExample(this)">解雇されそう 💼</div>
  </div>

  <div class="chat-area" id="chat"></div>

  <div class="input-area">
    <div class="input-box">
      <textarea id="input" rows="1" placeholder="困ってることを話しかけてね..."
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
    <p class="disclaimer" id="disclaimer">⚠️ このサービスは法的アドバイスではありません。参考情報としてご活用ください。</p>
  </div>

</div>

<script>
let currentLang = 'ja';
let chatStarted = false;
let conversationHistory = [];
let turnCount = 0;

const texts = {
  ja: {
    logoText: 'ほうりつ相談室',
    heroTitle: 'なんでも<span>気軽に</span>聞いてみて！',
    heroSub: '法律のことって難しそう…でも大丈夫。<br>あなたの言葉で話しかけてね。',
    placeholderFirst: '困ってることを話しかけてね...',
    placeholderCont: 'さらに詳しく聞いてみて...',
    disclaimer: '⚠️ このサービスは法的アドバイスではありません。参考情報としてご活用ください。',
    backLabel: 'トップに戻る',
    turnLabel: (n) => `${n}回目の相談`,
    chips: ['残業代が払われない 😤','隣の木が敷地に入ってきた 🌳','敷金が返ってこない 🏠','ネット上で悪口を書かれた 😢','解雇されそう 💼'],
    system: `あなたは日本の法律をわかりやすく説明するアシスタントです。
ユーザーが日常の困りごとを話しかけてきたら、関係する日本の法律をわかりやすく、親しみやすい言葉で説明してください。
会話の文脈を必ず踏まえて回答してください。

必ず以下のJSON形式で返答してください（マークダウンのコードブロックは不要）：
{
  "reply": "ここに回答を書く（マークダウン使用可）",
  "actions": ["次の選択肢1", "次の選択肢2", "次の選択肢3"]
}

actionsには、ユーザーが次に取りたいと思う行動を3つ、短く具体的に書いてください。
例：「請求書の作り方を教えて」「相談窓口はどこ？」「もっと詳しく知りたい」「別の問題を相談する」

回答は共感→法律説明→具体的アクションの順で。絵文字を適度に使いフレンドリーに。`
  },
  en: {
    logoText: 'Law Buddy',
    heroTitle: 'Ask me <span>anything</span>!',
    heroSub: "Law sounds scary... but don't worry!<br>Just talk to me like a friend.",
    placeholderFirst: "Tell me what's bothering you...",
    placeholderCont: 'Ask a follow-up question...',
    disclaimer: '⚠️ This is not legal advice. For reference only.',
    backLabel: 'Back to Top',
    turnLabel: (n) => `Question ${n}`,
    chips: ["My boss won't pay overtime 😤","Neighbor's tree in my yard 🌳","Landlord kept my deposit 🏠","Being harassed online 😢","Facing unfair dismissal 💼"],
    system: `You are a friendly assistant that explains Japanese law in simple, easy-to-understand English.
Always consider the full conversation context.

Always respond in this exact JSON format (no markdown code blocks):
{
  "reply": "Your answer here (markdown allowed)",
  "actions": ["Next option 1", "Next option 2", "Next option 3"]
}

actions should be 3 short, specific things the user might want to do next.
Examples: "How do I file a complaint?", "Where can I get help?", "Tell me more", "Ask about something else"

Format: empathy → law explanation → concrete actions. Use emojis naturally. Keep it friendly.`
  }
};

function goTop() {
  document.getElementById('chat').innerHTML = '';
  document.getElementById('hero').style.display = '';
  document.getElementById('examples').style.display = '';
  document.getElementById('back-btn').classList.remove('visible');
  document.getElementById('input').value = '';
  document.getElementById('input').style.height = 'auto';
  document.getElementById('input').placeholder = texts[currentLang].placeholderFirst;
  chatStarted = false;
  conversationHistory = [];
  turnCount = 0;
}

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent === lang.toUpperCase()));
  const t = texts[lang];
  document.getElementById('logo-ja').textContent = t.logoText;
  document.getElementById('hero-title').innerHTML = t.heroTitle;
  document.getElementById('hero-sub').innerHTML = t.heroSub;
  document.getElementById('input').placeholder = chatStarted ? t.placeholderCont : t.placeholderFirst;
  document.getElementById('disclaimer').textContent = t.disclaimer;
  document.getElementById('back-label').textContent = t.backLabel;
  const chips = document.getElementById('examples').querySelectorAll('.chip');
  chips.forEach((c, i) => c.textContent = t.chips[i]);
  if (chatStarted) goTop();
}

function useExample(el) {
  const text = el.textContent.replace(/\p{Emoji}/gu, '').trim();
  document.getElementById('input').value = text;
  autoResize(document.getElementById('input'));
  sendMessage();
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function formatReply(reply) {
  return reply
    .replace(/^## (.*?)$/gm, '<h3>$1</h3>')
    .replace(/^### (.*?)$/gm, '<strong>$1</strong>')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/【(.*?)】/g, '<div class="law-tag">📜 $1</div>')
    .replace(/^- (.*?)$/gm, '<li>$1</li>')
    .replace(/\n\n/g, '<br><br>')
    .replace(/\n/g, '<br>');
}

function addDivider(n) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'turn-divider';
  div.innerHTML = `<span>${texts[currentLang].turnLabel(n)}</span>`;
  chat.appendChild(div);
}

function addMessage(role, content) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = `message ${role}`;
  const avatar = document.createElement('div');
  avatar.className = `avatar ${role}`;
  avatar.textContent = role === 'ai' ? '⚖️' : '👤';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  if (role === 'ai') bubble.innerHTML = content;
  else bubble.textContent = content;
  div.appendChild(avatar);
  div.appendChild(bubble);
  chat.appendChild(div);
  div.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

function addActionButtons(actions) {
  const chat = document.getElementById('chat');
  const wrap = document.createElement('div');
  wrap.className = 'next-actions';
  actions.forEach(action => {
    const btn = document.createElement('button');
    btn.className = 'action-btn';
    btn.textContent = action;
    btn.onclick = () => {
      // ボタンを消す
      wrap.remove();
      // その選択肢をユーザーの発言として送信
      document.getElementById('input').value = action;
      sendMessage();
    };
    wrap.appendChild(btn);
  });
  chat.appendChild(wrap);
  wrap.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

function showTyping() {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'message ai';
  div.id = 'typing-indicator';
  const avatar = document.createElement('div');
  avatar.className = 'avatar ai';
  avatar.textContent = '⚖️';
  const bubble = document.createElement('div');
  bubble.className = 'bubble typing';
  bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  div.appendChild(avatar);
  div.appendChild(bubble);
  chat.appendChild(div);
  div.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

function removeTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

async function sendMessage() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;

  // 残ってるアクションボタンを消す
  document.querySelectorAll('.next-actions').forEach(el => el.remove());

  if (!chatStarted) {
    chatStarted = true;
    document.getElementById('hero').style.display = 'none';
    document.getElementById('examples').style.display = 'none';
    document.getElementById('back-btn').classList.add('visible');
  }

  turnCount++;
  addDivider(turnCount);

  conversationHistory.push({ role: 'user', content: text });
  addMessage('user', text);
  input.value = '';
  input.style.height = 'auto';
  input.placeholder = texts[currentLang].placeholderCont;

  showTyping();

  try {
    const t = texts[currentLang];
    const response = await fetch('https://lawbuddy.tk-xx719.workers.dev/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 1200,
        system: t.system,
        messages: conversationHistory
      })
    });

    const data = await response.json();
    removeTyping();

    const rawText = data.content?.[0]?.text || '';

    let reply = '';
    let actions = [];

    try {
      // JSON解析を試みる
      const cleaned = rawText.replace(/```json|```/g, '').trim();
      const parsed = JSON.parse(cleaned);
      reply = parsed.reply || rawText;
      actions = parsed.actions || [];
    } catch {
      // JSON失敗時はそのまま表示
      reply = rawText || (currentLang === 'ja' ? '申し訳ありません、エラーが発生しました。' : 'Sorry, something went wrong.');
    }

    conversationHistory.push({ role: 'assistant', content: reply });
    addMessage('ai', formatReply(reply));

    if (actions.length > 0) {
      addActionButtons(actions);
    }

  } catch (e) {
    removeTyping();
    conversationHistory.pop();
    turnCount--;
    addMessage('ai', currentLang === 'ja'
      ? 'ごめんなさい、エラーが発生しました。もう一度試してみてください。'
      : 'Sorry, something went wrong. Please try again.');
  }
}
</script>
</body>
</html>
