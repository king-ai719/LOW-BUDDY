<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="connect-src *;">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ほうりつ相談室 / LawBuddy</title>
<link href="https://fonts.googleapis.com/css2?family=Yomogi&family=Zen+Maru+Gothic:wght@400;500;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --sun: #FFB800;
    --orange: #FF6B35;
    --peach: #FFE5D0;
    --cream: #FFFBF5;
    --white: #FFFFFF;
    --ink: #2D2013;
    --ink-light: #6B4F2A;
    --shadow: rgba(255,107,53,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Zen Maru Gothic', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; overflow-x: hidden; }
  body::before { content: ''; position: fixed; inset: 0; background-image: radial-gradient(circle at 20% 20%, rgba(255,184,0,0.12) 0%, transparent 50%), radial-gradient(circle at 80% 80%, rgba(255,107,53,0.10) 0%, transparent 50%), radial-gradient(circle at 50% 50%, rgba(255,229,208,0.3) 0%, transparent 70%); pointer-events: none; z-index: 0; }

  .wrapper { position: relative; z-index: 1; max-width: 760px; margin: 0 auto; padding: 0 16px; display: flex; flex-direction: column; min-height: 100vh; }

  header { padding: 24px 0 16px; display: flex; align-items: center; justify-content: space-between; }
  .logo { display: flex; align-items: center; gap: 10px; cursor: pointer; }
  .logo-icon { width: 44px; height: 44px; background: linear-gradient(135deg, var(--sun), var(--orange)); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 22px; box-shadow: 0 4px 12px var(--shadow); transform: rotate(-3deg); transition: transform 0.2s; }
  .logo:hover .logo-icon { transform: rotate(0deg); }
  .logo-text { display: flex; flex-direction: column; line-height: 1.1; }
  .logo-ja { font-family: 'Yomogi', cursive; font-size: 18px; color: var(--orange); letter-spacing: 0.05em; }
  .logo-en { font-family: 'Outfit', sans-serif; font-size: 11px; font-weight: 600; color: var(--ink-light); letter-spacing: 0.12em; text-transform: uppercase; }
  .header-right { display: flex; align-items: center; gap: 10px; }

  .back-btn { display: none; align-items: center; gap: 6px; padding: 6px 14px; background: var(--white); border: 1.5px solid rgba(255,107,53,0.3); border-radius: 20px; font-family: 'Zen Maru Gothic', sans-serif; font-size: 12px; color: var(--orange); cursor: pointer; box-shadow: 0 2px 8px var(--shadow); transition: all 0.2s; }
  .back-btn:hover { background: var(--peach); border-color: var(--orange); transform: translateY(-1px); }
  .back-btn.visible { display: flex; }

  .lang-toggle { display: flex; background: var(--white); border-radius: 20px; padding: 3px; box-shadow: 0 2px 8px var(--shadow); gap: 2px; }
  .lang-btn { padding: 5px 14px; border-radius: 16px; border: none; background: transparent; font-family: 'Outfit', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; color: var(--ink-light); transition: all 0.2s; }
  .lang-btn.active { background: linear-gradient(135deg, var(--sun), var(--orange)); color: white; box-shadow: 0 2px 6px rgba(255,107,53,0.3); }

  .top-screen { animation: fadeUp 0.5s ease both; }
  .hero { text-align: center; padding: 16px 0 20px; }
  .hero-emoji { font-size: 48px; display: block; margin-bottom: 10px; animation: bounce 2s ease-in-out infinite; }
  @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
  .hero h1 { font-family: 'Yomogi', cursive; font-size: 24px; color: var(--ink); line-height: 1.4; margin-bottom: 6px; }
  .hero h1 span { color: var(--orange); }
  .hero p { font-size: 13px; color: var(--ink-light); line-height: 1.7; }

  .category-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin: 20px 0; }
  .category-card { background: var(--white); border: 1.5px solid rgba(255,107,53,0.15); border-radius: 18px; padding: 18px 16px; cursor: pointer; transition: all 0.2s; box-shadow: 0 2px 10px var(--shadow); display: flex; flex-direction: column; gap: 8px; }
  .category-card:hover { border-color: var(--orange); transform: translateY(-3px); box-shadow: 0 6px 20px var(--shadow); background: var(--peach); }
  .category-icon { font-size: 32px; }
  .category-name { font-size: 15px; font-weight: 700; color: var(--ink); }
  .category-desc { font-size: 11px; color: var(--ink-light); line-height: 1.5; }

  .free-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--sun), var(--orange)); border: none; border-radius: 20px; font-family: 'Zen Maru Gothic', sans-serif; font-size: 15px; font-weight: 700; color: white; cursor: pointer; box-shadow: 0 4px 16px rgba(255,107,53,0.3); transition: all 0.2s; margin-bottom: 20px; }
  .free-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,107,53,0.4); }

  .chat-screen { display: none; flex-direction: column; flex: 1; animation: fadeUp 0.4s ease both; }
  .category-badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; background: var(--peach); border: 1px solid rgba(255,107,53,0.3); border-radius: 20px; font-size: 12px; color: var(--orange); font-weight: 600; margin-bottom: 12px; }

  .faq-section { margin-bottom: 16px; }
  .faq-label { font-size: 11px; color: var(--ink-light); margin-bottom: 8px; opacity: 0.7; }
  .faq-chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip { background: var(--white); border: 1.5px solid rgba(255,107,53,0.2); border-radius: 20px; padding: 7px 14px; font-size: 12px; color: var(--ink); cursor: pointer; transition: all 0.2s; box-shadow: 0 2px 6px var(--shadow); white-space: nowrap; }
  .chip:hover { background: var(--peach); border-color: var(--orange); transform: translateY(-2px); }

  .chat-area { flex: 1; display: flex; flex-direction: column; gap: 16px; padding: 8px 0; min-height: 200px; }
  .message { display: flex; gap: 10px; align-items: flex-start; animation: fadeUp 0.3s ease both; }
  .message.user { flex-direction: row-reverse; }
  .avatar { width: 36px; height: 36px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .avatar.ai { background: linear-gradient(135deg, var(--sun), var(--orange)); box-shadow: 0 3px 10px var(--shadow); }
  .avatar.user { background: var(--ink); }

  .bubble { max-width: 75%; padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.7; box-shadow: 0 2px 8px var(--shadow); }
  .message.ai .bubble { background: var(--white); border-radius: 4px 18px 18px 18px; color: var(--ink); }
  .message.user .bubble { background: linear-gradient(135deg, var(--orange), #FF4500); border-radius: 18px 4px 18px 18px; color: white; }
  .bubble h3 { font-size: 14px; font-weight: 700; margin: 10px 0 4px; color: var(--ink); }
  .bubble li { margin-left: 16px; margin-bottom: 2px; }

  .law-tag { display: inline-block; background: linear-gradient(135deg, rgba(255,184,0,0.15), rgba(255,107,53,0.15)); border: 1px solid rgba(255,107,53,0.3); border-radius: 6px; padding: 2px 8px; font-size: 11px; font-weight: 700; color: var(--orange); margin-bottom: 8px; }

  .next-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; padding-left: 46px; animation: fadeUp 0.4s ease both; }
  .action-btn { background: var(--white); border: 1.5px solid rgba(255,107,53,0.3); border-radius: 20px; padding: 8px 16px; font-family: 'Zen Maru Gothic', sans-serif; font-size: 13px; color: var(--ink); cursor: pointer; transition: all 0.2s; box-shadow: 0 2px 8px var(--shadow); }
  .action-btn:hover { background: var(--peach); border-color: var(--orange); color: var(--orange); transform: translateY(-2px); }
  .action-btn:active { transform: scale(0.97); }

  .doc-btn { background: linear-gradient(135deg, rgba(255,184,0,0.1), rgba(255,107,53,0.1)); border: 1.5px solid var(--orange); border-radius: 20px; padding: 8px 16px; font-family: 'Zen Maru Gothic', sans-serif; font-size: 13px; color: var(--orange); cursor: pointer; transition: all 0.2s; box-shadow: 0 2px 8px var(--shadow); font-weight: 700; }
  .doc-btn:hover { background: var(--orange); color: white; transform: translateY(-2px); }

  /* SNSシェアバー */
  .share-bar { display: flex; gap: 8px; margin-top: 8px; padding-left: 46px; animation: fadeUp 0.5s 0.1s ease both; }
  .share-btn { display: flex; align-items: center; gap: 5px; padding: 6px 14px; border-radius: 20px; font-family: 'Zen Maru Gothic', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  .share-x { background: #000; color: white; }
  .share-x:hover { opacity: 0.8; transform: translateY(-1px); }
  .share-line { background: #06C755; color: white; }
  .share-line:hover { opacity: 0.8; transform: translateY(-1px); }

  .turn-divider { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
  .turn-divider span { font-size: 10px; color: var(--ink-light); opacity: 0.4; white-space: nowrap; }
  .turn-divider::before, .turn-divider::after { content: ''; flex: 1; height: 1px; background: rgba(107,79,42,0.1); }

  .typing { display: flex; align-items: center; gap: 4px; padding: 14px 16px; }
  .dot { width: 7px; height: 7px; background: var(--orange); border-radius: 50%; animation: typing 1.2s ease-in-out infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typing { 0%, 60%, 100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-6px); opacity: 1; } }

  .input-area { position: sticky; bottom: 0; padding: 16px 0 24px; background: linear-gradient(transparent, var(--cream) 30%); }
  .input-box { display: flex; align-items: flex-end; gap: 10px; background: var(--white); border-radius: 24px; padding: 10px 10px 10px 18px; box-shadow: 0 4px 20px var(--shadow), 0 0 0 2px rgba(255,107,53,0.1); transition: box-shadow 0.2s; }
  .input-box:focus-within { box-shadow: 0 4px 24px rgba(255,107,53,0.2), 0 0 0 2px rgba(255,107,53,0.3); }
  textarea { flex: 1; border: none; outline: none; font-family: 'Zen Maru Gothic', sans-serif; font-size: 14px; color: var(--ink); background: transparent; resize: none; max-height: 120px; line-height: 1.6; }
  textarea::placeholder { color: rgba(107,79,42,0.4); }

  .send-btn { width: 42px; height: 42px; background: linear-gradient(135deg, var(--sun), var(--orange)); border: none; border-radius: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; box-shadow: 0 3px 10px rgba(255,107,53,0.3); }
  .send-btn:hover { transform: scale(1.05); }
  .send-btn:active { transform: scale(0.97); }
  .send-btn svg { width: 18px; height: 18px; fill: white; }

  .disclaimer { text-align: center; font-size: 10px; color: var(--ink-light); opacity: 0.6; margin-top: 10px; }

  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; padding: 16px; }
  .modal-bg.open { display: flex; }
  .modal { background: var(--white); border-radius: 20px; padding: 24px; width: 100%; max-width: 500px; max-height: 80vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.15); }
  .modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; color: var(--ink); }
  .modal textarea { width: 100%; height: 200px; border: 1.5px solid rgba(255,107,53,0.3); border-radius: 12px; padding: 12px; font-family: 'Zen Maru Gothic', sans-serif; font-size: 13px; color: var(--ink); resize: vertical; outline: none; line-height: 1.7; }
  .modal textarea:focus { border-color: var(--orange); }
  .modal-actions { display: flex; gap: 10px; margin-top: 12px; }
  .modal-copy { flex: 1; padding: 10px; background: linear-gradient(135deg, var(--sun), var(--orange)); border: none; border-radius: 12px; font-family: 'Zen Maru Gothic', sans-serif; font-size: 13px; font-weight: 700; color: white; cursor: pointer; transition: all 0.2s; }
  .modal-copy:hover { opacity: 0.9; }
  .modal-close-btn { padding: 10px 16px; background: var(--cream); border: 1.5px solid rgba(107,79,42,0.2); border-radius: 12px; font-family: 'Zen Maru Gothic', sans-serif; font-size: 13px; color: var(--ink-light); cursor: pointer; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,107,53,0.3); border-radius: 4px; }
</style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="logo" onclick="goTop()">
      <div class="logo-icon">⚖️</div>
      <div class="logo-text">
        <span class="logo-ja" id="logo-ja">ほうりつ相談室</span>
        <span class="logo-en">LAW BUDDY</span>
      </div>
    </div>
    <div class="header-right">
      <button class="back-btn" id="back-btn" onclick="goTop()">
        🏠 <span id="back-label">トップに戻る</span>
      </button>
      <div class="lang-toggle">
        <button class="lang-btn active" onclick="setLang('ja')">JP</button>
        <button class="lang-btn" onclick="setLang('en')">EN</button>
      </div>
    </div>
  </header>

  <div class="top-screen" id="top-screen">
    <div class="hero">
      <span class="hero-emoji">⚖️</span>
      <h1 id="hero-title">どんな<span>お悩み</span>ですか？</h1>
      <p id="hero-sub">カテゴリを選ぶか、直接話しかけてね。</p>
    </div>

    <div class="category-grid">
      <div class="category-card" onclick="selectCategory('labor')">
        <span class="category-icon">💼</span>
        <span class="category-name" id="cat-labor-name">労働・雇用</span>
        <span class="category-desc" id="cat-labor-desc">残業代・解雇・ハラスメントなど</span>
      </div>
      <div class="category-card" onclick="selectCategory('housing')">
        <span class="category-icon">🏠</span>
        <span class="category-name" id="cat-housing-name">住まい・不動産</span>
        <span class="category-desc" id="cat-housing-desc">敷金・退去・近隣トラブルなど</span>
      </div>
      <div class="category-card" onclick="selectCategory('money')">
        <span class="category-icon">💰</span>
        <span class="category-name" id="cat-money-name">お金・契約</span>
        <span class="category-desc" id="cat-money-desc">借金・詐欺・契約トラブルなど</span>
      </div>
      <div class="category-card" onclick="selectCategory('online')">
        <span class="category-icon">📱</span>
        <span class="category-name" id="cat-online-name">ネット・SNS</span>
        <span class="category-desc" id="cat-online-desc">誹謗中傷・プライバシーなど</span>
      </div>
      <div class="category-card" onclick="selectCategory('family')">
        <span class="category-icon">👨‍👩‍👧</span>
        <span class="category-name" id="cat-family-name">家族・相続</span>
        <span class="category-desc" id="cat-family-desc">離婚・相続・養育費など</span>
      </div>
      <div class="category-card" onclick="selectCategory('other')">
        <span class="category-icon">🔍</span>
        <span class="category-name" id="cat-other-name">その他</span>
        <span class="category-desc" id="cat-other-desc">上記以外のお悩みはこちら</span>
      </div>
    </div>

    <button class="free-btn" id="free-btn" onclick="selectCategory('free')">
      💬 なんでも相談する
    </button>
  </div>

  <div class="chat-screen" id="chat-screen">
    <div class="category-badge" id="category-badge">💼 労働・雇用</div>
    <div class="faq-section" id="faq-section">
      <div class="faq-label" id="faq-label">よくある質問</div>
      <div class="faq-chips" id="faq-chips"></div>
    </div>
    <div class="chat-area" id="chat"></div>
    <div class="input-area">
      <div class="input-box">
        <textarea id="input" rows="1" placeholder="困ってることを話しかけてね..."
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
        </button>
      </div>
      <p class="disclaimer" id="disclaimer">⚠️ このサービスは法的アドバイスではありません。参考情報としてご活用ください。</p>
    </div>
  </div>

</div>

<div class="modal-bg" id="doc-modal">
  <div class="modal">
    <h3 id="modal-title">📄 書類を生成しました</h3>
    <textarea id="modal-content" readonly></textarea>
    <div class="modal-actions">
      <button class="modal-copy" onclick="copyDoc()">📋 コピーする</button>
      <button class="modal-close-btn" onclick="closeModal()">閉じる</button>
    </div>
  </div>
</div>

<script>
let currentLang = 'ja';
let conversationHistory = [];
let turnCount = 0;
let currentCategory = 'free';

const categories = {
  ja: {
    labor:   { badge: '💼 労働・雇用',   faqLabel: 'よくある質問', faqs: ['残業代が払われない', '突然解雇された', 'パワハラを受けている', '退職を引き止められている', '有給休暇を取らせてもらえない'] },
    housing: { badge: '🏠 住まい',       faqLabel: 'よくある質問', faqs: ['敷金が返ってこない', '隣の騒音がひどい', '家賃を値上げされた', '退去費用が高すぎる', '無断で部屋に入られた'] },
    money:   { badge: '💰 お金・契約',   faqLabel: 'よくある質問', faqs: ['詐欺にあったかもしれない', '契約を解除したい', '借金の取り立てがひどい', '消費者金融の返済が苦しい', '商品が届かない'] },
    online:  { badge: '📱 ネット・SNS',  faqLabel: 'よくある質問', faqs: ['ネット上で悪口を書かれた', '個人情報が流出した', 'なりすましアカウントがある', '脅迫メッセージが来た', '著作権を侵害された'] },
    family:  { badge: '👨‍👩‍👧 家族・相続', faqLabel: 'よくある質問', faqs: ['離婚したい', '養育費を払ってもらえない', '相続でもめている', 'DVから逃げたい', '親の介護費用が払えない'] },
    other:   { badge: '🔍 その他',       faqLabel: 'よくある質問', faqs: ['交通事故にあった', '医療ミスかもしれない', '会社を訴えたい', '警察に相談すべきか', '弁護士費用が払えない'] },
    free:    { badge: '💬 なんでも相談', faqLabel: 'よくある質問', faqs: ['残業代が払われない', '敷金が返ってこない', 'ネット上で悪口を書かれた', '解雇されそう', '詐欺にあったかもしれない'] },
  },
  en: {
    labor:   { badge: '💼 Work',    faqLabel: 'Common questions', faqs: ["Boss won't pay overtime", 'Got fired suddenly', 'Being harassed at work', 'Employer blocking resignation', 'Denied paid leave'] },
    housing: { badge: '🏠 Housing', faqLabel: 'Common questions', faqs: ["Landlord kept my deposit", 'Noisy neighbors', 'Rent suddenly raised', 'Move-out costs too high', 'Unauthorized entry'] },
    money:   { badge: '💰 Money',   faqLabel: 'Common questions', faqs: ['Possible scam/fraud', 'Want to cancel a contract', 'Aggressive debt collectors', 'Product never arrived', 'Loan repayment issues'] },
    online:  { badge: '📱 Online',  faqLabel: 'Common questions', faqs: ['Harassed online', 'Personal info leaked', 'Fake account impersonating me', 'Receiving threats online', 'Copyright violated'] },
    family:  { badge: '👨‍👩‍👧 Family', faqLabel: 'Common questions', faqs: ['Want to divorce', 'Not receiving child support', 'Inheritance dispute', 'Escaping domestic violence', 'Elder care costs'] },
    other:   { badge: '🔍 Other',   faqLabel: 'Common questions', faqs: ['Traffic accident', 'Possible medical malpractice', 'Want to sue', 'Should I contact police?', "Can't afford a lawyer"] },
    free:    { badge: '💬 General', faqLabel: 'Common questions', faqs: ["Boss won't pay overtime", "Landlord kept my deposit", 'Harassed online', 'Facing dismissal', 'Possible fraud'] },
  }
};

const texts = {
  ja: {
    logoText: 'ほうりつ相談室',
    heroTitle: 'どんな<span>お悩み</span>ですか？',
    heroSub: 'カテゴリを選ぶか、直接話しかけてね。',
    freeBtn: '💬 なんでも相談する',
    placeholderFirst: '困ってることを話しかけてね...',
    placeholderCont: 'さらに詳しく聞いてみて...',
    disclaimer: '⚠️ このサービスは法的アドバイスではありません。参考情報としてご活用ください。',
    backLabel: 'トップに戻る',
    turnLabel: (n) => `${n}回目の相談`,
    docTitle: '📄 書類を生成しました',
    docCopy: '📋 コピーする',
    shareX: '𝕏 シェア',
    shareLine: '🟢 LINEで送る',
    shareText: 'ほうりつ相談室で法律の悩みを無料で相談できた！✨ #ほうりつ相談室 #法律',
    system: (cat) => `あなたは日本の法律をわかりやすく説明するアシスタントです。
現在のカテゴリ：${cat}
ユーザーの困りごとに関係する日本の法律をわかりやすく、親しみやすい言葉で説明してください。
会話の文脈を必ず踏まえて自然につなげてください。

【重要】必ず以下のJSON形式のみで返答。前置き・コードブロック不要。JSONのみ：
{"reply":"回答（マークダウン使用可）","actions":["選択肢1","選択肢2","選択肢3"],"docType":""}

docTypeは書類生成が適切な場合のみ（例："退職届","内容証明"）。不要なら空文字。
actionsには次の行動を3つ。絵文字OK。共感→法律説明→アクションの順で。`
  },
  en: {
    logoText: 'Law Buddy',
    heroTitle: 'What\'s your <span>concern</span>?',
    heroSub: 'Pick a category or just ask freely.',
    freeBtn: '💬 Ask Anything',
    placeholderFirst: "Tell me what's bothering you...",
    placeholderCont: 'Ask a follow-up question...',
    disclaimer: '⚠️ This is not legal advice. For reference only.',
    backLabel: 'Back to Top',
    turnLabel: (n) => `Question ${n}`,
    docTitle: '📄 Document Generated',
    docCopy: '📋 Copy',
    shareX: '𝕏 Share',
    shareLine: '🟢 Share on LINE',
    shareText: 'I just got free legal advice on LawBuddy! ✨ #LawBuddy',
    system: (cat) => `You are a friendly assistant explaining Japanese law in simple English.
Current category: ${cat}
Always consider conversation context and refer back naturally.

IMPORTANT: Output ONLY this JSON. No preamble, no code blocks:
{"reply":"Answer (markdown OK)","actions":["Option 1","Option 2","Option 3"],"docType":""}

docType: fill only when appropriate (e.g. "resignation letter"). Empty otherwise.
actions: 3 short next steps. Format: empathy → law → actions.`
  }
};

function goTop() {
  document.getElementById('top-screen').style.display = '';
  document.getElementById('chat-screen').style.display = 'none';
  document.getElementById('back-btn').classList.remove('visible');
  document.getElementById('chat').innerHTML = '';
  document.getElementById('input').value = '';
  document.getElementById('input').style.height = 'auto';
  document.getElementById('faq-section').style.display = '';
  conversationHistory = [];
  turnCount = 0;
  currentCategory = 'free';
}

function selectCategory(cat) {
  currentCategory = cat;
  const c = categories[currentLang][cat];
  const t = texts[currentLang];
  document.getElementById('category-badge').textContent = c.badge;
  document.getElementById('faq-label').textContent = c.faqLabel;
  const faqChips = document.getElementById('faq-chips');
  faqChips.innerHTML = '';
  c.faqs.forEach(faq => {
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.textContent = faq;
    chip.onclick = () => { document.getElementById('input').value = faq; autoResize(document.getElementById('input')); sendMessage(); };
    faqChips.appendChild(chip);
  });
  document.getElementById('top-screen').style.display = 'none';
  document.getElementById('chat-screen').style.display = 'flex';
  document.getElementById('back-btn').classList.add('visible');
  document.getElementById('input').placeholder = t.placeholderFirst;
}

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent === lang.toUpperCase()));
  const t = texts[lang];
  document.getElementById('logo-ja').textContent = t.logoText;
  document.getElementById('hero-title').innerHTML = t.heroTitle;
  document.getElementById('hero-sub').textContent = t.heroSub;
  document.getElementById('free-btn').textContent = t.freeBtn;
  document.getElementById('disclaimer').textContent = t.disclaimer;
  document.getElementById('back-label').textContent = t.backLabel;
  const keys = ['labor','housing','money','online','family','other'];
  keys.forEach(k => {
    const n = document.getElementById(`cat-${k}-name`);
    if(n) n.textContent = categories[lang][k].badge.replace(/^.+? /,'');
  });
  goTop();
}

function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }
function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }

function formatReply(reply) {
  return reply
    .replace(/^## (.*?)$/gm, '<h3>$1</h3>')
    .replace(/^### (.*?)$/gm, '<strong>$1</strong>')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/【(.*?)】/g, '<div class="law-tag">📜 $1</div>')
    .replace(/^- (.*?)$/gm, '<li>$1</li>')
    .replace(/\n\n/g, '<br><br>')
    .replace(/\n/g, '<br>');
}

function addDivider(n) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'turn-divider';
  div.innerHTML = `<span>${texts[currentLang].turnLabel(n)}</span>`;
  chat.appendChild(div);
}

function addMessage(role, content) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = `message ${role}`;
  const avatar = document.createElement('div');
  avatar.className = `avatar ${role}`;
  avatar.textContent = role === 'ai' ? '⚖️' : '👤';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  if (role === 'ai') bubble.innerHTML = content;
  else bubble.textContent = content;
  div.appendChild(avatar);
  div.appendChild(bubble);
  chat.appendChild(div);
  div.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

function addActionButtons(actions, docType) {
  const chat = document.getElementById('chat');
  const t = texts[currentLang];

  const wrap = document.createElement('div');
  wrap.className = 'next-actions';

  actions.forEach(action => {
    const btn = document.createElement('button');
    btn.className = 'action-btn';
    btn.textContent = action;
    btn.onclick = () => { wrap.remove(); shareBar.remove(); document.getElementById('input').value = action; sendMessage(); };
    wrap.appendChild(btn);
  });

  if (docType) {
    const docBtn = document.createElement('button');
    docBtn.className = 'doc-btn';
    docBtn.textContent = `📄 ${docType}を作成`;
    docBtn.onclick = () => generateDoc(docType);
    wrap.appendChild(docBtn);
  }

  chat.appendChild(wrap);

  // SNSシェアバー
  const shareBar = document.createElement('div');
  shareBar.className = 'share-bar';
  const url = encodeURIComponent('https://king-ai719.github.io/LOW-BUDDY/');
  const shareText = encodeURIComponent(t.shareText);

  const xBtn = document.createElement('button');
  xBtn.className = 'share-btn share-x';
  xBtn.textContent = t.shareX;
  xBtn.onclick = () => window.open(`https://twitter.com/intent/tweet?text=${shareText}&url=${url}`, '_blank');

  const lineBtn = document.createElement('button');
  lineBtn.className = 'share-btn share-line';
  lineBtn.textContent = t.shareLine;
  lineBtn.onclick = () => window.open(`https://social-plugins.line.me/lineit/share?url=${url}&text=${shareText}`, '_blank');

  shareBar.appendChild(xBtn);
  shareBar.appendChild(lineBtn);
  chat.appendChild(shareBar);
  shareBar.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

function showTyping() {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'message ai';
  div.id = 'typing-indicator';
  const avatar = document.createElement('div');
  avatar.className = 'avatar ai';
  avatar.textContent = '⚖️';
  const bubble = document.createElement('div');
  bubble.className = 'bubble typing';
  bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  div.appendChild(avatar);
  div.appendChild(bubble);
  chat.appendChild(div);
  div.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

function removeTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

function parseAIResponse(rawText) {
  let cleaned = rawText.replace(/```json\s*/gi, '').replace(/```/g, '').trim();
  const match = cleaned.match(/\{[\s\S]*\}/);
  if (match) {
    try { return JSON.parse(match[0]); } catch(e) {
      try { return JSON.parse(match[0].replace(/,(\s*[}\]])/g, '$1')); } catch(e2) {}
    }
  }
  return null;
}

async function generateDoc(docType) {
  const t = texts[currentLang];
  const catName = categories[currentLang][currentCategory].badge;
  const prompt = currentLang === 'ja'
    ? `これまでの会話を踏まえて、${docType}のテンプレートを作成してください。[氏名][日付]などのプレースホルダーを使って具体的に。書類本文のみ出力。`
    : `Based on our conversation, generate a ${docType} template with placeholders like [Name][Date]. Output only the document text.`;

  document.getElementById('doc-modal').classList.add('open');
  document.getElementById('modal-title').textContent = currentLang === 'ja' ? '⏳ 生成中...' : '⏳ Generating...';
  document.getElementById('modal-content').value = '';

  try {
    const msgs = [...conversationHistory, { role: 'user', content: prompt }];
    const response = await fetch('https://lawbuddy.tk-xx719.workers.dev/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-5', max_tokens: 1200, system: t.system(catName), messages: msgs })
    });
    const data = await response.json();
    const rawText = data.content?.[0]?.text || '';
    const parsed = parseAIResponse(rawText);
    const docText = (parsed?.reply || rawText).replace(/<[^>]*>/g, '');
    document.getElementById('modal-title').textContent = t.docTitle;
    document.getElementById('modal-content').value = docText;
  } catch(e) {
    document.getElementById('modal-content').value = currentLang === 'ja' ? 'エラーが発生しました。' : 'Error occurred.';
  }
}

function copyDoc() {
  const content = document.getElementById('modal-content').value;
  navigator.clipboard.writeText(content).then(() => {
    const btn = document.querySelector('.modal-copy');
    btn.textContent = currentLang === 'ja' ? '✓ コピーしました！' : '✓ Copied!';
    setTimeout(() => { btn.textContent = texts[currentLang].docCopy; }, 2000);
  });
}

function closeModal() { document.getElementById('doc-modal').classList.remove('open'); }

async function sendMessage() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;

  document.getElementById('faq-section').style.display = 'none';
  document.querySelectorAll('.next-actions, .share-bar').forEach(el => el.remove());

  turnCount++;
  addDivider(turnCount);
  conversationHistory.push({ role: 'user', content: text });
  addMessage('user', text);
  input.value = '';
  input.style.height = 'auto';
  input.placeholder = texts[currentLang].placeholderCont;

  showTyping();

  try {
    const t = texts[currentLang];
    const catName = categories[currentLang][currentCategory].badge;
    const response = await fetch('https://lawbuddy.tk-xx719.workers.dev/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-5', max_tokens: 1200, system: t.system(catName), messages: conversationHistory })
    });

    const data = await response.json();
    removeTyping();

    const rawText = data.content?.[0]?.text || '';
    const parsed = parseAIResponse(rawText);

    let reply, actions, docType;
    if (parsed && parsed.reply) {
      reply = parsed.reply;
      actions = parsed.actions || [];
      docType = parsed.docType || '';
      conversationHistory.push({ role: 'assistant', content: rawText });
    } else {
      reply = rawText || (currentLang === 'ja' ? '申し訳ありません、エラーが発生しました。' : 'Sorry, something went wrong.');
      actions = [];
      docType = '';
      conversationHistory.push({ role: 'assistant', content: rawText });
    }

    addMessage('ai', formatReply(reply));
    if (actions.length > 0 || docType) addActionButtons(actions, docType);

  } catch (e) {
    removeTyping();
    conversationHistory.pop();
    turnCount--;
    addMessage('ai', currentLang === 'ja'
      ? 'ごめんなさい、エラーが発生しました。もう一度試してみてください。'
      : 'Sorry, something went wrong. Please try again.');
  }
}
</script>
